<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Cobalt Wave: Knowledge graph / neural network topology -->

  <!-- ── EDGES (drawn first, behind nodes) ── -->
  <g stroke-width="0.9" fill="none">
    <!-- Tier 0 → Tier 1 -->
    <line x1="960"  y1="60"  x2="340"  y2="200" stroke="rgba(6,182,212,0.18)"/>
    <line x1="960"  y1="60"  x2="720"  y2="180" stroke="rgba(6,182,212,0.16)"/>
    <line x1="960"  y1="60"  x2="1200" y2="180" stroke="rgba(6,182,212,0.16)"/>
    <line x1="960"  y1="60"  x2="1580" y2="200" stroke="rgba(6,182,212,0.18)"/>

    <!-- Tier 1 → Tier 2 -->
    <line x1="340"  y1="200" x2="160"  y2="380" stroke="rgba(6,182,212,0.15)"/>
    <line x1="340"  y1="200" x2="480"  y2="360" stroke="rgba(6,182,212,0.14)"/>
    <line x1="720"  y1="180" x2="600"  y2="360" stroke="rgba(6,182,212,0.14)"/>
    <line x1="720"  y1="180" x2="840"  y2="340" stroke="rgba(6,182,212,0.13)"/>
    <line x1="1200" y1="180" x2="1080" y2="340" stroke="rgba(6,182,212,0.13)"/>
    <line x1="1200" y1="180" x2="1320" y2="360" stroke="rgba(6,182,212,0.14)"/>
    <line x1="1580" y1="200" x2="1440" y2="360" stroke="rgba(6,182,212,0.14)"/>
    <line x1="1580" y1="200" x2="1760" y2="380" stroke="rgba(6,182,212,0.15)"/>

    <!-- Cross edges Tier 1 -->
    <line x1="340"  y1="200" x2="720"  y2="180" stroke="rgba(6,182,212,0.08)" stroke-dasharray="5,7"/>
    <line x1="1200" y1="180" x2="1580" y2="200" stroke="rgba(6,182,212,0.08)" stroke-dasharray="5,7"/>
    <line x1="720"  y1="180" x2="1200" y2="180" stroke="rgba(59,130,246,0.10)" stroke-dasharray="5,7"/>

    <!-- Tier 2 → Tier 3 -->
    <line x1="160"  y1="380" x2="80"   y2="560" stroke="rgba(6,182,212,0.13)"/>
    <line x1="160"  y1="380" x2="300"  y2="540" stroke="rgba(6,182,212,0.12)"/>
    <line x1="480"  y1="360" x2="420"  y2="540" stroke="rgba(6,182,212,0.13)"/>
    <line x1="480"  y1="360" x2="600"  y2="520" stroke="rgba(6,182,212,0.12)"/>
    <line x1="600"  y1="360" x2="540"  y2="540" stroke="rgba(6,182,212,0.12)"/>
    <line x1="840"  y1="340" x2="760"  y2="520" stroke="rgba(6,182,212,0.12)"/>
    <line x1="840"  y1="340" x2="960"  y2="500" stroke="rgba(6,182,212,0.13)"/>
    <line x1="1080" y1="340" x2="1000" y2="520" stroke="rgba(6,182,212,0.12)"/>
    <line x1="1080" y1="340" x2="1160" y2="500" stroke="rgba(6,182,212,0.12)"/>
    <line x1="1320" y1="360" x2="1260" y2="540" stroke="rgba(6,182,212,0.12)"/>
    <line x1="1320" y1="360" x2="1400" y2="520" stroke="rgba(59,130,246,0.12)"/>
    <line x1="1440" y1="360" x2="1520" y2="540" stroke="rgba(6,182,212,0.13)"/>
    <line x1="1760" y1="380" x2="1680" y2="540" stroke="rgba(6,182,212,0.12)"/>
    <line x1="1760" y1="380" x2="1860" y2="540" stroke="rgba(6,182,212,0.13)"/>

    <!-- Cross edges Tier 2 -->
    <line x1="480"  y1="360" x2="600"  y2="360" stroke="rgba(6,182,212,0.07)" stroke-dasharray="4,6"/>
    <line x1="840"  y1="340" x2="1080" y2="340" stroke="rgba(6,182,212,0.07)" stroke-dasharray="4,6"/>
    <line x1="1320" y1="360" x2="1440" y2="360" stroke="rgba(6,182,212,0.07)" stroke-dasharray="4,6"/>

    <!-- Tier 3 → Tier 4 -->
    <line x1="80"   y1="560" x2="140"  y2="720" stroke="rgba(6,182,212,0.11)"/>
    <line x1="300"  y1="540" x2="280"  y2="720" stroke="rgba(6,182,212,0.10)"/>
    <line x1="420"  y1="540" x2="460"  y2="700" stroke="rgba(6,182,212,0.11)"/>
    <line x1="540"  y1="540" x2="520"  y2="710" stroke="rgba(6,182,212,0.10)"/>
    <line x1="600"  y1="520" x2="640"  y2="700" stroke="rgba(6,182,212,0.10)"/>
    <line x1="760"  y1="520" x2="720"  y2="700" stroke="rgba(6,182,212,0.11)"/>
    <line x1="960"  y1="500" x2="880"  y2="700" stroke="rgba(6,182,212,0.11)"/>
    <line x1="960"  y1="500" x2="1040" y2="700" stroke="rgba(6,182,212,0.10)"/>
    <line x1="1000" y1="520" x2="1040" y2="700" stroke="rgba(6,182,212,0.10)"/>
    <line x1="1160" y1="500" x2="1200" y2="700" stroke="rgba(6,182,212,0.10)"/>
    <line x1="1260" y1="540" x2="1280" y2="710" stroke="rgba(6,182,212,0.11)"/>
    <line x1="1400" y1="520" x2="1400" y2="700" stroke="rgba(59,130,246,0.11)"/>
    <line x1="1520" y1="540" x2="1560" y2="700" stroke="rgba(6,182,212,0.10)"/>
    <line x1="1680" y1="540" x2="1640" y2="700" stroke="rgba(6,182,212,0.11)"/>
    <line x1="1860" y1="540" x2="1840" y2="700" stroke="rgba(6,182,212,0.10)"/>

    <!-- Tier 4 → Tier 5 (faint bottom) -->
    <line x1="140"  y1="720" x2="240"  y2="880" stroke="rgba(6,182,212,0.08)"/>
    <line x1="460"  y1="700" x2="480"  y2="880" stroke="rgba(6,182,212,0.08)"/>
    <line x1="720"  y1="700" x2="720"  y2="880" stroke="rgba(6,182,212,0.08)"/>
    <line x1="880"  y1="700" x2="960"  y2="880" stroke="rgba(6,182,212,0.09)"/>
    <line x1="1040" y1="700" x2="960"  y2="880" stroke="rgba(6,182,212,0.08)"/>
    <line x1="1200" y1="700" x2="1200" y2="880" stroke="rgba(6,182,212,0.08)"/>
    <line x1="1400" y1="700" x2="1440" y2="880" stroke="rgba(59,130,246,0.08)"/>
    <line x1="1640" y1="700" x2="1680" y2="880" stroke="rgba(6,182,212,0.08)"/>
  </g>

  <!-- ── NODES ── -->
  <!-- Tier 0: root -->
  <circle cx="960"  cy="60"  r="8"   fill="rgba(6,182,212,0.65)"/>

  <!-- Tier 1 -->
  <circle cx="340"  cy="200" r="6"   fill="rgba(6,182,212,0.55)"/>
  <circle cx="720"  cy="180" r="5.5" fill="rgba(6,182,212,0.50)"/>
  <circle cx="1200" cy="180" r="5.5" fill="rgba(6,182,212,0.50)"/>
  <circle cx="1580" cy="200" r="6"   fill="rgba(6,182,212,0.55)"/>

  <!-- Tier 2 -->
  <circle cx="160"  cy="380" r="5"   fill="rgba(6,182,212,0.45)"/>
  <circle cx="480"  cy="360" r="5"   fill="rgba(6,182,212,0.45)"/>
  <circle cx="600"  cy="360" r="4.5" fill="rgba(6,182,212,0.42)"/>
  <circle cx="840"  cy="340" r="5.5" fill="rgba(6,182,212,0.50)"/>
  <circle cx="1080" cy="340" r="5.5" fill="rgba(6,182,212,0.50)"/>
  <circle cx="1320" cy="360" r="4.5" fill="rgba(6,182,212,0.42)"/>
  <circle cx="1440" cy="360" r="5"   fill="rgba(6,182,212,0.45)"/>
  <circle cx="1760" cy="380" r="5"   fill="rgba(6,182,212,0.45)"/>

  <!-- Tier 3 -->
  <circle cx="80"   cy="560" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="300"  cy="540" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="420"  cy="540" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="540"  cy="540" r="3.5" fill="rgba(6,182,212,0.35)"/>
  <circle cx="600"  cy="520" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="760"  cy="520" r="4"   fill="rgba(6,182,212,0.40)"/>
  <circle cx="960"  cy="500" r="5"   fill="rgba(6,182,212,0.48)"/>
  <circle cx="1000" cy="520" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="1160" cy="500" r="4"   fill="rgba(6,182,212,0.40)"/>
  <circle cx="1260" cy="540" r="3.5" fill="rgba(6,182,212,0.35)"/>
  <circle cx="1400" cy="520" r="4"   fill="rgba(59,130,246,0.42)"/>
  <circle cx="1520" cy="540" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="1680" cy="540" r="4"   fill="rgba(6,182,212,0.38)"/>
  <circle cx="1860" cy="540" r="4"   fill="rgba(6,182,212,0.38)"/>

  <!-- Tier 4 -->
  <circle cx="140"  cy="720" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="280"  cy="720" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="460"  cy="700" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="520"  cy="710" r="3"   fill="rgba(6,182,212,0.30)"/>
  <circle cx="640"  cy="700" r="3"   fill="rgba(6,182,212,0.30)"/>
  <circle cx="720"  cy="700" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="880"  cy="700" r="3.5" fill="rgba(6,182,212,0.34)"/>
  <circle cx="1040" cy="700" r="4"   fill="rgba(6,182,212,0.36)"/>
  <circle cx="1200" cy="700" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="1280" cy="710" r="3"   fill="rgba(6,182,212,0.30)"/>
  <circle cx="1400" cy="700" r="3.5" fill="rgba(59,130,246,0.36)"/>
  <circle cx="1560" cy="700" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="1640" cy="700" r="3.5" fill="rgba(6,182,212,0.32)"/>
  <circle cx="1840" cy="700" r="3"   fill="rgba(6,182,212,0.30)"/>

  <!-- Tier 5 (faint bottom) -->
  <circle cx="240"  cy="880" r="3"   fill="rgba(6,182,212,0.25)"/>
  <circle cx="480"  cy="880" r="3"   fill="rgba(6,182,212,0.25)"/>
  <circle cx="720"  cy="880" r="3"   fill="rgba(6,182,212,0.25)"/>
  <circle cx="960"  cy="880" r="3.5" fill="rgba(6,182,212,0.28)"/>
  <circle cx="1200" cy="880" r="3"   fill="rgba(6,182,212,0.25)"/>
  <circle cx="1440" cy="880" r="3"   fill="rgba(59,130,246,0.25)"/>
  <circle cx="1680" cy="880" r="3"   fill="rgba(6,182,212,0.25)"/>

  <!-- Hub glow rings (most connected nodes) -->
  <circle cx="960"  cy="60"  r="14"  fill="none" stroke="rgba(6,182,212,0.18)" stroke-width="1.5"/>
  <circle cx="840"  cy="340" r="10"  fill="none" stroke="rgba(6,182,212,0.14)" stroke-width="1.2"/>
  <circle cx="1080" cy="340" r="10"  fill="none" stroke="rgba(6,182,212,0.14)" stroke-width="1.2"/>
  <circle cx="960"  cy="500" r="9"   fill="none" stroke="rgba(6,182,212,0.13)" stroke-width="1.2"/>
</svg>
